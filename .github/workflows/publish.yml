name: Publish NuGet

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Area27.Hub/Area27.Hub.csproj

      - name: Build
        run: dotnet build Area27.Hub/Area27.Hub.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Area27.Hub/Area27.Hub.csproj -c Release --no-build -o out

      - name: Publish to NuGet
        run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
